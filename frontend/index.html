<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sylk Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Sylk Mesh Dashboard</h1>
    </header>
    <main>
        <section id="node-grid">
            <!-- Node cards will be injected here -->
        </section>
        <section id="task-submission">
            <h2>Submit Task</h2>
            <textarea id="task-code" placeholder="Enter Python code here..."></textarea>
            <button id="submit-btn" onclick="submitTask()">Run Task</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
