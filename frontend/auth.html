<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .monolith-glow {
            background: radial-gradient(circle at center, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
        }
        @keyframes drift-slow {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 15px) rotate(2deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }
        .animate-drift-slow {
            animation: drift-slow 20s ease-in-out infinite;
        }
        .glass-card {
            background: rgba(17, 17, 17, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    
        @keyframes pulse-glow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.1); }
        }
        .animate-pulse-glow {
            animation: pulse-glow 15s ease-in-out infinite;
        }
        .glow-violet {
            background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
        }
        .glow-charcoal {
            background: radial-gradient(circle, rgba(40, 40, 40, 0.4) 0%, transparent 70%);
        }
        .hidden { display: none; }

<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Immersive Background Elements (Monolith Style) -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
<!-- Centered Abstract Monolith -->

</div>
<!-- Atmospheric Glows -->
<div class="absolute inset-0 monolith-glow z-10"></div>
<!-- Deep Vignette -->
<div class="absolute inset-0 bg-gradient-to-b from-black/60 via-transparent to-black/80 z-20"></div>
<!-- Sylk Midnight Atmospheric Glows -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] glow-violet blur-3xl animate-pulse-glow z-10 pointer-events-none"></div>
</div>
<header class="w-full top-0 sticky bg-black/60 backdrop-blur-xl border-b border-white/5 font-['Inter'] antialiased z-50">
<div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto">
<div class="flex items-center gap-10">
<span class="text-2xl font-bold tracking-tighter text-white cursor-pointer" onclick="location.href='index.html'">Sylk</span>
<div class="hidden md:flex gap-8 items-center">
<a class="text-on-surface-variant hover:text-white transition-colors duration-200 text-sm font-medium cursor-pointer" href="index.html">Home</a>
<a class="text-on-surface-variant hover:text-white transition-colors duration-200 text-sm font-medium cursor-pointer" href="deploy.html">Deploy</a>
<a class="text-on-surface-variant hover:text-white transition-colors duration-200 text-sm font-medium cursor-pointer" href="projects.html">Projects</a>
<a class="text-on-surface-variant hover:text-white transition-colors duration-200 text-sm font-medium cursor-pointer" href="logs.html">Logs</a>
<a class="text-on-surface-variant hover:text-white transition-colors duration-200 text-sm font-medium cursor-pointer" href="metrics.html">Usage</a>
</div>
</div>
<div class="flex items-center gap-8">
<button class="bg-white text-black px-6 py-2 rounded-full text-sm font-bold hover:bg-white/90 transition-all active:scale-95 shadow-[0_0_20px_rgba(255,255,255,0.1)]" id="nav-auth-toggle" onclick="toggleAuth()">Sign Up</button>
</div>
</div>

<main class="flex-grow flex items-center justify-center relative z-30 px-6 py-20">
<div class="w-full max-w-md">
<!-- Auth Header -->
<div class="mb-12 text-center" id="auth-header">
<h1 class="text-5xl md:text-6xl font-extrabold tracking-tighter text-white mb-6 leading-tight" id="header-title">
                    Welcome back to the kinetic engine.
                </h1>
<p class="font-label text-xs tracking-[0.3em] text-outline uppercase font-bold" id="header-subtitle">
                    Authentication Required // V2.4.0
                </p>
</div>
<!-- Auth Card -->
<div class="glass-card p-10 rounded-2xl shadow-[0_64px_128px_-24px_rgba(0,0,0,0.9)] relative overflow-hidden ring-1 ring-white/10">
<div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-primary/40 to-transparent"></div>
<div class="space-y-8">
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 bg-white/5 py-3.5 px-4 rounded-lg hover:bg-white/10 border border-white/5 transition-all duration-300 group">

<span class="font-label text-xs uppercase tracking-widest font-bold">GitHub</span>
</button>
<button class="flex items-center justify-center gap-3 bg-white/5 py-3.5 px-4 rounded-lg hover:bg-white/10 border border-white/5 transition-all duration-300 group">
<svg class="w-5 h-5 opacity-80 group-hover:opacity-100" viewbox="0 0 24 24"><path d="M5.2662 9.7645c.1977-.6423.5132-1.2423.923-1.777L4.0152 6.0622C2.7112 8.0177 2 10.15 2 12s.7112 3.9823 2.0152 5.9378l2.174-1.9253c-.4098-.5347-.7253-1.1347-.923-1.777H11.5v-4.471H5.2662z" fill="#EA4335"></path><path d="M16.0407 17.5c-1.111.834-2.6107 1.3-4.0407 1.3-3.2307 0-6.002-2.147-7.2348-5.1122l-2.174 1.9253C4.5448 19.3444 8.053 22 12 22c3.411 0 6.388-1.554 8.2833-3.9747l-4.2426-3.5253z" fill="#FBBC04"></path><path d="M12 5.2c1.43 0 2.9297.466 4.0407 1.3L20.2833 2.9747C18.388 1.554 15.411 0 12 0 8.053 0 4.5448 2.6556 2.5902 6.387l2.174 1.9252C5.998 5.347 8.7693 3.2 12 3.2z" fill="#34A853"></path><path d="M22 12c0-.6639-.0571-1.314-.1652-1.9444H11.5v4.471h5.952c-.27 1.411-1.071 2.611-2.222 3.3944l4.2426 3.5253C21.317 19.5667 22 16 22 12z" fill="#4285F4"></path></svg>
<span class="font-label text-xs uppercase tracking-widest font-bold">Google</span>
</button>
</div>
<!-- Divider -->
<div class="flex items-center gap-4">
<div class="h-[1px] flex-grow bg-white/10"></div>
<span class="font-label text-[10px] text-outline uppercase tracking-[0.2em] font-medium">Or continue with</span>
<div class="h-[1px] flex-grow bg-white/10"></div>
</div>
<!-- Auth Flow -->
<form class="space-y-6" id="auth-form" onsubmit="event.preventDefault(); location.href='logs.html'">
<div class="space-y-2 hidden" id="name-field">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-outline pl-1 font-bold">Full Name</label>
<input class="w-full bg-black/40 border border-white/10 focus:ring-2 focus:ring-primary/50 focus:border-primary/50 text-on-surface py-4 px-5 rounded-lg transition-all duration-300 placeholder:text-outline/30" placeholder="John Doe" type="text"/>
</div>
<div class="space-y-2">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-outline pl-1 font-bold">Email Address</label>
<input class="w-full bg-black/40 border border-white/10 focus:ring-2 focus:ring-primary/50 focus:border-primary/50 text-on-surface py-4 px-5 rounded-lg transition-all duration-300 placeholder:text-outline/30" placeholder="dev@sylk.io" type="email" required/>
</div>
<div class="space-y-2">
<label class="font-label text-[10px] uppercase tracking-[0.2em] text-outline pl-1 font-bold">Secret Key</label>
<input class="w-full bg-black/40 border border-white/10 focus:ring-2 focus:ring-primary/50 focus:border-primary/50 text-on-surface py-4 px-5 rounded-lg transition-all duration-300 placeholder:text-outline/30" placeholder="••••••••" type="password" required/>
</div>
<button class="w-full bg-white text-black py-5 text-sm font-bold rounded-lg hover:shadow-[0_0_30px_rgba(255,255,255,0.25)] active:scale-[0.97] transition-all duration-300 mt-4 flex items-center justify-center gap-3" type="submit" id="submit-btn text">
<span id="btn-text">Deploy Session</span>
<span class="material-symbols-outlined text-lg">terminal</span>
</button>
</form>
</div>
<!-- Toggle -->
<div class="mt-10 pt-8 border-t border-white/10 text-center">
<p class="text-sm text-on-surface-variant" id="toggle-container">
                        Don't have an account? 
                        <a class="text-white hover:text-primary transition-colors font-bold ml-1 decoration-1 underline-offset-4 cursor-pointer" onclick="toggleAuth()">Sign up</a>
</p>
</div>
</div>
<!-- Security Notice -->
<div class="mt-16 flex items-center justify-center gap-8 opacity-40">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="font-label text-[10px] uppercase tracking-widest font-bold">AES-256</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm">shield</span>
<span class="font-label text-[10px] uppercase tracking-widest font-bold">ISO 27001</span>
</div>
</div>
</div>
</main>
<footer class="bg-black/80 backdrop-blur-md w-full border-t border-white/5 font-['Space_Grotesk'] text-[10px] tracking-[0.3em] uppercase relative z-30">
<div class="flex flex-col md:flex-row justify-between items-center px-10 py-12 gap-8 max-w-7xl mx-auto">
<div class="text-outline font-medium">© 2024 Sylk Kinetic Systems Inc.</div>
<div class="flex gap-10">
<a class="text-outline hover:text-white transition-colors duration-300" href="#">Documentation</a>
<a class="text-outline hover:text-white transition-colors duration-300" href="#">Status</a>
<a class="text-outline hover:text-white transition-colors duration-300" href="#">Privacy</a>
<a class="text-outline hover:text-white transition-colors duration-300" href="#">Terms</a>
</div>
</div>
</footer>
<script>
  let isLogin = true;

  function toggleAuth() {
    isLogin = !isLogin;
    const nameField = document.getElementById('name-field');
    const headerTitle = document.getElementById('header-title');
    const headerSubtitle = document.getElementById('header-subtitle');
    const btnText = document.getElementById('btn-text');
    const toggleContainer = document.getElementById('toggle-container');
    const navAuthToggle = document.getElementById('nav-auth-toggle');

    if (isLogin) {
      nameField.classList.add('hidden');
      headerTitle.innerText = "Welcome back to the kinetic engine.";
      headerSubtitle.innerText = "Authentication Required // V2.4.0";
      btnText.innerText = "Deploy Session";
      toggleContainer.innerHTML = 'Don\'t have an account? <a class="text-white hover:text-primary transition-colors font-bold ml-1 decoration-1 underline-offset-4 cursor-pointer" onclick="toggleAuth()">Sign up</a>';
      navAuthToggle.innerText = "Sign Up";
    } else {
      nameField.classList.remove('hidden');
      headerTitle.innerText = "Join the next generation of compute.";
      headerSubtitle.innerText = "Create Your Account // V2.4.0";
      btnText.innerText = "Initialize Account";
      toggleContainer.innerHTML = 'Already have an account? <a class="text-white hover:text-primary transition-colors font-bold ml-1 decoration-1 underline-offset-4 cursor-pointer" onclick="toggleAuth()">Log in</a>';
      navAuthToggle.innerText = "Log In";
    }
  }

  window.addEventListener('mousemove', (e) => {
    const x = e.clientX / window.innerWidth;
    const y = e.clientY / window.innerHeight;
    const bg = document.querySelector('.animate-drift-slow img');
    if (bg) {
        bg.style.transform = `translate(${(x - 0.5) * 40}px, ${(y - 0.5) * 40}px) scale(1.05)`;
    }
  });
</script>
</body>
</html>
