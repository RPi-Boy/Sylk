version: "3.8"
services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      # Mount DB file — touch it first on the host if it doesn't exist
      - ./sylk_analytics.db:/app/sylk_analytics.db
    restart: unless-stopped

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    restart: unless-stopped
