version: "3.8"
services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    volumes:
      - db_data:/app/data
    labels:
      - "sylk-type=infrastructure"
    restart: unless-stopped

  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    labels:
      - "sylk-type=infrastructure"
    restart: unless-stopped

volumes:
  db_data:
