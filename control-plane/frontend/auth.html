  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .monolith-glow {
      background: radial-gradient(circle at center, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
    }

    @keyframes drift-slow {
      0% {
        transform: translate(0, 0) rotate(0deg);
      }

      50% {
        transform: translate(30px, 15px) rotate(2deg);
      }

      100% {
        transform: translate(0, 0) rotate(0deg);
      }
    }

    .animate-drift-slow {
      animation: drift-slow 20s ease-in-out infinite;
    }

    .glass-card {
      background: rgba(17, 17, 17, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    @keyframes pulse-glow {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(1.1);
      }
    }

    .animate-pulse-glow {
      animation: pulse-glow 15s ease-in-out infinite;
    }

    .glow-violet {
      background: radial-gradient(circle, rgba(124, 58, 237, 0.2) 0%, transparent 70%);
    }

    .glow-charcoal {
      background: radial-gradient(circle, rgba(40, 40, 40, 0.4) 0%, transparent 70%);

          <a class="text-on-surface-variant hover:text-white transition-colors duration-200 text-sm font-medium cursor-pointer"

      <div class="flex gap-10">
        <a class="text-outline hover:text-white transition-colors duration-300" href="#">Documentation</a>
        <a class="text-outline hover:text-white transition-colors duration-300" href="#">Status</a>
      </div>
    </div>

  <script>
    window.addEventListener('mousemove', (e) => {
      const x = e.clientX / window.innerWidth;
      const y = e.clientY / window.innerHeight;
      const bg = document.querySelector('.animate-drift-slow img');
      if (bg) {
        bg.style.transform = `translate(${(x - 0.5) * 40}px, ${(y - 0.5) * 40}px) scale(1.05)`;
      }
    });

    // Authentication Logic
    let mode = "login";
    const authForm = document.getElementById("auth-form");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const usernameInput = document.getElementById("username");
    const errorMsg = document.getElementById("error-msg");
    const toggleBtn = document.getElementById("toggle-mode-btn");
    const btnText = document.getElementById("btn-text");
    const navAuthToggle = document.getElementById('nav-auth-toggle');
    const nameField = document.getElementById('name-field');
    const headerTitle = document.getElementById('header-title');
    const headerSubtitle = document.getElementById('header-subtitle');

    authForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.classList.add("hidden");
      const email = emailInput.value;
      const password = passwordInput.value;

      const submitBtn = document.getElementById("submit-btn text");
      submitBtn.classList.add("opacity-50", "pointer-events-none");

      try {
        if (mode === "login") {
          const res = await SylkAPI.login(email, password);
          Session.setToken(res.token, res.email, res.username);
          window.location.href = "index.html";
        } else {
          const username = usernameInput.value || email.split("@")[0];
          await SylkAPI.signup(username, email, password);
          const res = await SylkAPI.login(email, password);
          Session.setToken(res.token, res.email, res.username);
          window.location.href = "index.html";
        }
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove("hidden");
      } finally {
        submitBtn.classList.remove("opacity-50", "pointer-events-none");
      }
    });

    function toggleMode() {
      mode = mode === "login" ? "signup" : "login";
      if (mode === "login") {
        nameField.classList.add('hidden');
        headerTitle.innerText = "Welcome back to the kinetic engine.";
        headerSubtitle.innerText = "Authentication Required // V2.4.0";
        btnText.innerText = "Deploy Session";
        toggleBtn.innerText = "Sign up";
        document.getElementById("toggle-container").innerHTML = 'Don\'t have an account? <a id="toggle-mode-btn" class="text-white hover:text-primary transition-colors font-bold ml-1 decoration-1 underline-offset-4 cursor-pointer" onclick="toggleMode()">Sign up</a>';
        navAuthToggle.innerText = "Sign Up";
      } else {
        nameField.classList.remove('hidden');
        headerTitle.innerText = "Join the next generation of compute.";
        headerSubtitle.innerText = "Create Your Account // V2.4.0";
        btnText.innerText = "Initialize Account";
        toggleBtn.innerText = "Log in";
        document.getElementById("toggle-container").innerHTML = 'Already have an account? <a id="toggle-mode-btn" class="text-white hover:text-primary transition-colors font-bold ml-1 decoration-1 underline-offset-4 cursor-pointer" onclick="toggleMode()">Log in</a>';
        navAuthToggle.innerText = "Log In";
      }
      errorMsg.classList.add("hidden");
    }
  </script>
